services:
  llmzip-api:
    build:
      context: .
      dockerfile: Dockerfile.models
    container_name: llmzip-api
    command: ["uvicorn", "llmzip.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./.llmzip.config:/app/.llmzip.config:ro
      - ./.llmzipignore:/app/.llmzipignore:ro
      - ./.llmzipignore.local:/app/.llmzipignore.local:ro
      - llmzip_models:/app/models
    ports:
      - "${LLMZIP_PORT:-8000}:8000"
    networks:
      - llmzip-internal
    environment:
      # Explicit override guarantees the tiktoken cache path even if the
      # container is started with a custom env that drops inherited ENVs.
      - TIKTOKEN_CACHE_DIR=/app/.tiktoken_cache
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

networks:
  llmzip-internal:
    driver: bridge
    internal: false     # api needs outbound for LiteLLM pricing fetch

volumes:
  llmzip_models:        # persists between restarts, survives docker-compose down
